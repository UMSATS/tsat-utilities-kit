name: Build and Test CAN Wrapper

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        build_type: [test, production]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive  # For any git submodules
    
    - name: Setup ARM GCC Toolchain
      uses: carlosperate/arm-none-eabi-gcc-action@v1
      with:
        release: '12.2.Rel1'  # Specify GCC version
    
    - name: Verify Toolchain Installation
      run: |
        arm-none-eabi-gcc --version
        arm-none-eabi-objcopy --version
        arm-none-eabi-size --version
    
    - name: Create Build Directory
      run: mkdir -p build
    
    - name: Build Test Version
      if: matrix.build_type == 'test'
      run: |
        arm-none-eabi-gcc \
          -mcpu=cortex-m4 -mthumb -mfpu=fpv4-sp-d16 -mfloat-abi=hard \
          -DUSE_HAL_DRIVER -DSTM32F407xx -DCWM_API_STANDARD -DRUN_TESTS -DDEBUG \
          -Og -g3 -Wall -fdata-sections -ffunction-sections \
          -Iinc -Isrc \
          -IDrivers/STM32F4xx_HAL_Driver/Inc \
          -IDrivers/CMSIS/Device/ST/STM32F4xx/Include \
          -IDrivers/CMSIS/Include \
          -IMiddlewares/Third_Party/FreeRTOS/Source/include \
          -IMiddlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS_V2 \
          -specs=nano.specs \
          -T STM32F407VGTx_FLASH.ld \
          -Wl,-Map=build/test.map,--cref -Wl,--gc-sections \
          -o build/test.elf \
          Src/can_wrapper/main.c Src/can_wrapper/can_wrapper.c Src/can_wrapper/test_can_wrapper.c \
          Src/can_wrapper/tx_cache.c Src/can_wrapper/can_command_list.c Src/debug/debug_logger.c \
          Src/debug/print.c Src/debug/log_buffer.c \
          -lc -lm -lnosys
    
    - name: Build Production Version  
      if: matrix.build_type == 'production'
      run: |
        arm-none-eabi-gcc \
          -mcpu=cortex-m4 -mthumb -mfpu=fpv4-sp-d16 -mfloat-abi=hard \
          -DUSE_HAL_DRIVER -DSTM32F407xx -DCWM_API_STANDARD -DNDEBUG \
          -O2 -Wall -fdata-sections -ffunction-sections \
          -Iinc -Isrc \
          -IDrivers/STM32F4xx_HAL_Driver/Inc \
          -IDrivers/CMSIS/Device/ST/STM32F4xx/Include \
          -IDrivers/CMSIS/Include \
          -IMiddlewares/Third_Party/FreeRTOS/Source/include \
          -IMiddlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS_V2 \
          -specs=nano.specs \
          -T STM32F407VGTx_FLASH.ld \
          -Wl,-Map=build/production.map,--cref -Wl,--gc-sections \
          -o build/production.elf \
          Src/can_wrapper/main.c Src/can_wrapper/can_wrapper.c \
          Src/can_wrapper/tx_cache.c Src/can_wrapper/can_command_list.c Src/debug/debug_logger.c \
          Src/debug/print.c Src/debug/log_buffer.c \
          -lc -lm -lnosys
    
    - name: Generate Hex Files
      run: |
        if [ -f build/test.elf ]; then
          arm-none-eabi-objcopy -O ihex build/test.elf build/test.hex
        fi
        if [ -f build/production.elf ]; then
          arm-none-eabi-objcopy -O ihex build/production.elf build/production.hex
        fi
    
    - name: Show Build Size
      run: |
        if [ -f build/test.elf ]; then
          echo "=== Test Build Size ==="
          arm-none-eabi-size build/test.elf
        fi
        if [ -f build/production.elf ]; then
          echo "=== Production Build Size ==="
          arm-none-eabi-size build/production.elf
        fi
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ matrix.build_type }}
        path: |
          build/*.elf
          build/*.hex
          build/*.map
        retention-days: 30

  static-analysis:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Run Cppcheck
      uses: deep5050/cppcheck-action@main
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        check_dir: 'src'
        exclude_dir: 'Drivers Middlewares'
        output_file: cppcheck-report.txt
        
    - name: Upload Static Analysis Results
      uses: actions/upload-artifact@v4
      with:
        name: static-analysis-report
        path: cppcheck-report.txt

  check-race-conditions:
    name: Check for Race Conditions
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Check Single Ownership Pattern
      run: |
        echo "=== Checking for Race Condition Fixes ==="
        
        CAN_WRAPPER_FILE="Src/can_wrapper/can_wrapper.c"
        
        if [ ! -f "$CAN_WRAPPER_FILE" ]; then
          echo "ERROR: $CAN_WRAPPER_FILE not found!"
          exit 1
        fi
        
        echo "Found $CAN_WRAPPER_FILE, proceeding with checks..."
        
        # Create a more sophisticated check using awk
        cat > check_cache_access.awk << 'EOF'
        BEGIN { 
            in_cache_manager = 0
            in_process_expired = 0
            in_init_function = 0
            violation_count = 0
        }
        
        # Track when we enter allowed functions
        /^void Cache_Manager_Thread/ || /^Cache_Manager_Thread/ { in_cache_manager = 1; next }
        /^static void Process_Expired_Items/ || /^void Process_Expired_Items/ { in_process_expired = 1; next }
        /^ErrorCode CANWrapper_Init/ { in_init_function = 1; next }
        
        # Track when we exit functions (simplified - look for closing brace at start of line)
        /^}/ { 
            in_cache_manager = 0
            in_process_expired = 0  
            in_init_function = 0
            next 
        }
        
        # Check s_tx_cache accesses
        /s_tx_cache/ {
            # Skip static declaration and initialization
            if (/static.*s_tx_cache.*=/ || /s_tx_cache.*=.*TxCache_Create/) {
                next
            }
            
            # Allow access in permitted functions
            if (in_cache_manager || in_process_expired || in_init_function) {
                print "ALLOWED: Line " NR ": " $0
            } else {
                print "VIOLATION: Line " NR ": " $0
                violation_count++
            }
        }
        
        END {
            if (violation_count > 0) {
                print "\nERROR: " violation_count " cache access violations found!"
                exit 1
            } else {
                print "\n✓ All s_tx_cache accesses are in permitted functions"
            }
        }
        EOF
        
        echo "Checking s_tx_cache access patterns..."
        if ! awk -f check_cache_access.awk "$CAN_WRAPPER_FILE"; then
          echo "Cache access violations detected!"
          exit 1
        fi
        
        # Check ISR safety with better context awareness
        echo "Checking ISR safety..."
        cat > check_isr_safety.awk << 'EOF'
        BEGIN { in_isr = 0; violation_count = 0 }
        
        /HAL_CAN_RxFifo0MsgPendingCallback/ { in_isr = 1; next }
        
        # End of function
        /^}/ && in_isr { in_isr = 0; next }
        
        # Check for direct cache access in ISR
        in_isr && (/TxCache_/ || /s_tx_cache\./) {
            print "ISR VIOLATION: Line " NR ": " $0
            violation_count++
        }
        
        END {
            if (violation_count > 0) {
                print "\nERROR: " violation_count " ISR cache access violations found!"
                exit 1
            } else {
                print "\n✓ ISR only uses message queues"
            }
        }
        EOF
        
        if ! awk -f check_isr_safety.awk "$CAN_WRAPPER_FILE"; then
          echo "ISR safety violations detected!"
          exit 1
        fi
        
        # Check bit operations are fixed
        echo "Checking bit operations..."
        bit_violations=$(grep -n "rx_behaviour *|[^=]" "$CAN_WRAPPER_FILE" | grep -v "|=" || true)
        if [ -n "$bit_violations" ]; then
          echo "ERROR: Bitwise OR bug still present:"
          echo "$bit_violations"
          exit 1
        else
          echo "✓ Bit operations use correct & operator"
        fi
        
        # Verify correct bit operations exist
        echo "Verifying correct bit operations..."
        correct_ops=$(grep -n "rx_behaviour.*&" "$CAN_WRAPPER_FILE" || true)
        if [ -n "$correct_ops" ]; then
          echo "✓ Found correct bitwise AND operations:"
          echo "$correct_ops" | head -3  # Show first 3 matches
        else
          echo "WARNING: No rx_behaviour & operations found"
        fi
        
        echo "=== All race condition checks passed! ==="
        
        # Cleanup temporary files
        rm -f check_cache_access.awk check_isr_safety.awk 
